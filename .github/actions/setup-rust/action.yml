name: 'Setup Rust Environment'
description: 'Install Rust toolchain and configure caching for optimal CI performance'

inputs:
  toolchain:
    description: 'Rust toolchain version (stable, nightly, or specific version like 1.85.0)'
    required: false
    default: 'stable'
  components:
    description: 'Additional components to install (space-separated, e.g., "rustfmt clippy")'
    required: false
    default: ''

runs:
  using: 'composite'
  steps:
    - name: Install Rust toolchain
      uses: dtolnay/rust-toolchain@stable
      with:
        toolchain: ${{ inputs.toolchain }}
        components: ${{ inputs.components }}

    - name: Setup Rust cache
      uses: Swatinem/rust-cache@v2
      with:
        # Cache key includes Cargo.lock for reproducible builds
        key: ${{ runner.os }}-rust-${{ hashFiles('**/Cargo.lock') }}
        # Cache all cargo artifacts including registry, git dependencies, and build outputs
        cache-all-crates: true
        # Save cache even if job fails (for incremental progress)
        save-if: true
