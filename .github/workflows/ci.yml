name: CI

on:
  push:
    branches: ['**']
  pull_request:
    branches: ['**']
  workflow_dispatch:

# Cancel in-progress runs when a new run is triggered
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  # Disable incremental compilation for CI (faster clean builds, smaller cache)
  CARGO_INCREMENTAL: 0
  # Reduce debug info to speed up builds and reduce cache size
  CARGO_PROFILE_DEV_DEBUG: 0
  RUST_BACKTRACE: 1

jobs:
  # ============================================================
  # Fast checks - fail fast if code doesn't meet basic standards
  # ============================================================
  lint:
    name: Lint (fmt + clippy)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Rust
        uses: ./.github/actions/setup-rust
        with:
          components: rustfmt clippy

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Run Clippy
        run: cargo clippy --all-targets --all-features -- -D warnings

  # ============================================================
  # Core jobs - run in parallel after lint passes
  # ============================================================
  test:
    name: Test (unit + integration)
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - name: Setup Rust
        uses: ./.github/actions/setup-rust

      - name: Run unit tests
        run: cargo test --lib --bins

      - name: Run integration tests
        run: cargo test --test '*'

      - name: Run doc tests
        run: cargo test --doc

  build:
    name: Build (release)
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - name: Setup Rust
        uses: ./.github/actions/setup-rust

      - name: Build release binary
        run: cargo build --release --bin svcmgr

      - name: Upload binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: svcmgr-${{ github.sha }}
          path: target/release/svcmgr
          retention-days: 7

  frontend:
    name: Frontend (build + test)
    runs-on: ubuntu-latest
    needs: lint
    defaults:
      run:
        working-directory: src/frontend
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: src/frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build

      - name: Run frontend tests
        run: npm test

      - name: Start preview server
        run: |
          npm run preview &
          PREVIEW_PID=$!
          echo "PREVIEW_PID=$PREVIEW_PID" >> $GITHUB_ENV
          # Wait for server to be ready
          timeout 30 bash -c 'until curl -f http://localhost:4173 > /dev/null 2>&1; do sleep 1; done' || exit 1

      - name: Health check
        run: |
          response=$(curl -f http://localhost:4173 || echo "FAILED")
          if [[ "$response" == "FAILED" ]]; then
            echo "❌ Health check failed"
            exit 1
          fi
          echo "✅ Health check passed"

      - name: Cleanup
        if: always()
        run: kill $PREVIEW_PID || true

  # ============================================================
  # Coverage - only run on main branch or manually
  # ============================================================
  coverage:
    name: Code Coverage
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' || github.event_name == 'workflow_dispatch'
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - name: Setup Rust
        uses: ./.github/actions/setup-rust

      - name: Install tarpaulin
        run: cargo install cargo-tarpaulin

      - name: Generate coverage
        run: cargo tarpaulin --out xml --output-dir ./coverage

      - name: Upload to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: ./coverage/cobertura.xml
          fail_ci_if_error: false
          verbose: true
